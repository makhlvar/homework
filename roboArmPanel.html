<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Роборука • Управление захватом</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #0b0c10 0%, #1f1f2b 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Roboto', system-ui, sans-serif;
            padding: 20px;
            margin: 0;
        }

        .control-panel {
            background: rgba(18, 20, 28, 0.9);
            backdrop-filter: blur(20px);
            border-radius: 56px;
            padding: 50px 40px 45px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.7), inset 0 1px 1px rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.08);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 40px;
            max-width: 650px;
            width: 100%;
            transition: all 0.3s ease;
        }

        .status-badge {
            font-size: 2.8rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #ffffff;
            background: rgba(255, 255, 255, 0.04);
            padding: 16px 40px;
            border-radius: 100px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            transition: all 0.35s ease;
            text-shadow: 0 2px 5px rgba(0,0,0,0.4);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .indicator-light {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: #f44336;
            box-shadow: 0 0 20px #f44336, 0 0 8px #ff7961;
            transition: background 0.3s, box-shadow 0.3s;
        }

        .status-gripped .indicator-light {
            background: #00e676;
            box-shadow: 0 0 28px #00e676, 0 0 12px #69f0ae;
        }

        .power-btn {
            border: none;
            border-radius: 60px;
            padding: 24px 60px;
            font-size: 2.2rem;
            font-weight: 700;
            letter-spacing: 4px;
            color: #e0e0e0;
            text-transform: uppercase;
            background: #2d2d44;
            box-shadow: 0 12px 0 #0a0a12, 0 18px 30px rgba(0, 0, 0, 0.6);
            cursor: pointer;
            transition: all 0.08s linear;
            border: 1px solid rgba(255, 255, 255, 0.15);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 100%;
            max-width: 340px;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .power-btn:active {
            transform: translateY(6px);
            box-shadow: 0 6px 0 #0a0a12, 0 14px 25px rgba(0, 0, 0, 0.7);
            background: #25253b;
        }

        .power-btn.gripped-state {
            background: #1b4b2c;
            box-shadow: 0 12px 0 #0a2e12, 0 18px 30px rgba(0, 180, 80, 0.35);
            border-color: rgba(0, 230, 118, 0.5);
            color: #ffffff;
        }

        .power-btn.gripped-state:active {
            box-shadow: 0 6px 0 #0a2e12, 0 14px 25px rgba(0, 200, 80, 0.5);
        }

        .url-hint {
            color: #a0a0b8;
            font-size: 0.9rem;
            background: rgba(0, 0, 0, 0.45);
            padding: 12px 20px;
            border-radius: 40px;
            text-align: center;
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            line-height: 1.6;
            font-family: 'Fira Code', monospace;
            word-break: break-w
ord;
        }

        code {
            background: #151522;
            color: #ffb86c;
            padding: 4px 10px;
            border-radius: 20px;
            font-weight: 600;
            margin: 0 3px;
        }
    </style>
</head>
<body>
    <div class="control-panel">
        <div class="status-badge" id="statusDisplay">
            <span class="indicator-light" id="ledIndicator"></span>
            <span id="statusText">РАЗЖАТА</span>
        </div>

        <button class="power-btn" id="toggleButton" aria-label="Сжать или разжать роборуку">
            <span>✊</span> СЖАТЬ
        </button>

        <div class="url-hint">
            💻 Командная строка:

            <code>?status=grip</code> или <code>?status=release</code>
        </div>
    </div>

    <script>
        (() => {
            // Кэширование DOM-элементов
            const dom = {
                statusText: document.getElementById('statusText'),
                ledIndicator: document.getElementById('ledIndicator'),
                toggleButton: document.getElementById('toggleButton'),
                statusDisplay: document.getElementById('statusDisplay')
            };

            // Конфигурация состояний захвата
            const STATES = {
                grip: {
                    text: 'СЖАТА',
                    ledColor: '#00e676',
                    ledShadow: '0 0 28px #00e676, 0 0 12px #69f0ae',
                    buttonHTML: '<span>🖐</span> РАЗЖАТЬ',
                },
                release: {
                    text: 'РАЗЖАТА',
                    ledColor: '#f44336',
                    ledShadow: '0 0 20px #f44336, 0 0 8px #ff7961',
                    buttonHTML: '<span>✊</span> СЖАТЬ',
                }
            };

            let isGripped = false; // false = разжата, true = сжата

            function updateUI(state) {
                const cfg = state ? STATES.grip : STATES.release;
                
                dom.statusText.textContent = cfg.text;
                dom.ledIndicator.style.backgroundColor = cfg.ledColor;
                dom.ledIndicator.style.boxShadow = cfg.ledShadow;
                dom.toggleButton.innerHTML = cfg.buttonHTML;
                
                // Исправлено: правильное переключение классов
                if (state) {
                    dom.statusDisplay.classList.add('status-gripped');
                    dom.toggleButton.classList.add('gripped-state');
                } else {
                    dom.statusDisplay.classList.remove('status-gripped');
                    dom.toggleButton.classList.remove('gripped-state');
                }
                
                console.log(`🦾 Роборука ${state ? '🟢 СЖАТА' : '🔴 РАЗЖАТА'}`);
            }

            function syncURL(status) {
                const url = new URL(window.location);
                url.searchParams.set('status', status);
                window.history.replaceState({}, '', url);
            }

            function toggleGrip(forceState) {
                isGripped = typeof forceState === 'boolean' ? forceState : !isGripped;
                const status = isGripped ? 'grip' : 'release';
                
                updateUI(isGripped);
                syncURL(status);
            }

            function getStatusFromURL() {
                const status = new URLSearchParams(window.location.search).get('status');
                return status === 'grip' ? true : status === 'release' ? false : null;
            }

            function init() {
                const urlState = getStatusFromURL();
                isGripped = urlState ?? false;
                
                updateUI(isGripped);
                
                if (urlState === null) {
                    syncURL('release');
                }
            }

            function syncFromURL() {
                const urlState = getStatusFromURL();
                const newState = urlState ?? false;
                
                if (
newState !== isGripped) {
                    isGripped = newState;
                    updateUI(isGripped);
                    if (urlState === null) syncURL('release');
                } else if (urlState === null && isGripped) {
                    toggleGrip(false);
                }
            }

            // Обработчики событий
            dom.toggleButton.addEventListener('click', () => toggleGrip());
            window.addEventListener('popstate', syncFromURL);
            window.addEventListener('focus', syncFromURL);

            // Старт
            init();
        })();
    </script>
</body>
</html>
